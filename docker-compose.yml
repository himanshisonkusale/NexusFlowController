services:
  redis:
    image: redis
    container_name: redis-hydra
    ports:
      - "6379:6379"

  node1:
    build: .
    container_name: nexus-node1
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - REDIS_HOST=redis
    depends_on:
      - redis

  node2:
    build: .
    container_name: nexus-node2
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - REDIS_HOST=redis
    depends_on:
      - redis

  node3:
    build: .
    container_name: nexus-node3
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
      - REDIS_HOST=redis
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - node1
      - node2
      - node3

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "4000:3000"